name: Update Plots

on:
  push:
    branches: [master]
    paths:
      - "data/tables/list_of_counties_active.csv"
  workflow_dispatch:

jobs:
  regenerate-plots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Regenerate plots
        run: PYTHONPATH=src uv run python src/generate_plots.py

      - name: Commit updated plots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/plots/
          git diff --cached --quiet || git commit -m "chore: regenerate plots [skip ci]"
          git pull --rebase
          git push
